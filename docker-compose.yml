version: "3.9"

services:
  argos:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - SQLITE_PATH=/data/honeypots.db
    restart: unless-stopped
    container_name: argos_bot
    command: ["node", "index.js"]
    volumes:
      - ./data:/data
